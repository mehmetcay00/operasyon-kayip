<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Operasyon İrem</title>

<style>
body { margin:0; background:#0b0f1a; overflow:hidden; font-family:Arial; }
canvas { display:block; margin:0 auto; background:#111827; }

#ui {
position:fixed; top:10px; left:10px;
background:rgba(0,0,0,0.6);
padding:10px;
color:white;
border-radius:10px;
max-width:300px;
}

button{
position:fixed;
bottom:20px;
width:80px;
height:80px;
border-radius:50%;
border:none;
font-size:20px;
opacity:0.7;
}

#left { left:20px; }
#right { left:110px; }
#jump { right:20px; background:#22c55e; }
</style>
</head>

<body>

<div id="ui">
💔 Operasyon: İrem<br>
🕵️ Kurtaran: Mehmet<br><br>
Görev: İrem’i kurtar ve kapıya ulaş 🚪
</div>

<canvas id="game" width="800" height="400"></canvas>

<button id="left">◀</button>
<button id="right">▶</button>
<button id="jump">⤒</button>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

let p = {x:50,y:300,w:30,h:30,vx:0,vy:0,on:false};
let g = 0.8;

let keys = {};

let goal = {x:720,y:320,w:40,h:40};

let plat = [
{x:0,y:350,w:800,h:50},
{x:150,y:280,w:100,h:10},
{x:300,y:230,w:100,h:10},
{x:450,y:180,w:100,h:10},
{x:600,y:250,w:100,h:10}
];

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

function update(){

p.vy += g;
p.x += p.vx;
p.y += p.vy;

p.on = false;

for(let i of plat){
if(col(p,i)){
if(p.vy>0){
p.y=i.y-p.h;
p.vy=0;
p.on=true;
}
}
}

if(keys["left"]) p.vx=-3;
else if(keys["right"]) p.vx=3;
else p.vx=0;

if(col(p,goal)){
document.getElementById("ui").innerHTML=
"🎉 Mehmet İrem’i kurtardı!<br><br>❤️ Operasyon tamamlandı!";
}
}

function draw(){
ctx.clearRect(0,0,800,400);

ctx.fillStyle="cyan";
ctx.fillRect(p.x,p.y,p.w,p.h);

ctx.fillStyle="white";
for(let i of plat){
ctx.fillRect(i.x,i.y,i.w,i.h);
}

ctx.fillStyle="gold";
ctx.fillRect(goal.x,goal.y,goal.w,goal.h);
}

function col(a,b){
return a.x<b.x+b.w &&
a.x+a.w>b.x &&
a.y<b.y+b.h &&
a.y+a.h>b.y;
}

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

document.getElementById("left").ontouchstart=()=>keys["left"]=true;
document.getElementById("left").ontouchend=()=>keys["left"]=false;

document.getElementById("right").ontouchstart=()=>keys["right"]=true;
document.getElementById("right").ontouchend=()=>keys["right"]=false;

document.getElementById("jump").ontouchstart=()=>{
if(p.on) p.vy=-12;
};
</script>

</body>
</html>
